environments:
  staging:
    # Connection details. Two ways to set the host:
    #
    # 1. SSH config alias (recommended). Define the connection once in
    #    ~/.ssh/config and reference it by name here. HostName, User, Port
    #    and IdentityFile all come from ~/.ssh/config, so leave user/port out.
    #    Bonus: keeps the server IP/user/port out of this file, so it can be
    #    committed to git. Each collaborator defines the alias locally.
    # host: my-staging-alias
    #
    # 2. Explicit host, with user/port as separate keys:
    # host: staging-server-ip   # hostname or IP only (no user@ or :port)
    # user: user                # optional
    # port: 22                  # optional
    #
    # path: /path/to/wordpress  # required. Remote WordPress root.
    # url: http://staging.example.com
    # before_push:
    # after_push:


  production:
    # See the staging block above for the connection options.
    # host: my-production-alias
    # path: /path/to/wordpress
    # url: http://production.example.com
    # before_push:
    # after_push:
